name: Deploy to Vercel (production)

# Why this workflow exists:
# Vercel's GitHub App is installed on the Gofetchcode account, but this repo
# lives at wewillwin2026/gladiusturf, so push-to-deploy via the native git
# integration cannot work. This workflow runs `vercel build` + `vercel deploy`
# in CI on every push to main, which is independent of the GitHub App and
# survives any future link disconnects.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts to production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed: $URL"
          echo "deploy_url=$URL" >> $GITHUB_OUTPUT
        id: deploy

      - name: Smoke test apex domain
        run: |
          for path in "" "/contact" "/pricing" "/forge"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://gladiusturf.com${path}")
            echo "GET /${path}  →  ${code}"
            if [ "$code" != "200" ]; then exit 1; fi
          done
